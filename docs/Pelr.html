		.app-header-search {
			float: right;
			padding: 10px;
			user-select: none;
		}

		.app-header-search input {
			font-size: 1rem;
		}

        .app-header-search-help {
            display: inline-block;
            color: #777;
            background-color: white;
            border: 1px solid #777;
            border-radius: 50%;
            width: 1.1rem;
            height: 1.1rem;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

		.app-header-stats {
			padding: 10px;
			padding-top: 0px;
			font-style: italic;
			margin-left: 64px;
		}

        @media screen and (max-width : 640px) {
            .app-header {
                position: relative;
                padding-bottom: 3rem;
            }

            .app-header-search {
                position: absolute;
                bottom: 0;
                right: 0;
            }
        }

		/* --- Main areas --- */

        .content {
			max-width: 1440px;
			display: none;
			padding: 0px;
			margin-left: auto;
			margin-right: auto;
			background: white;
			border: none;
			border-left: 1px solid #aaa;
			border-right: 1px solid #aaa;
			border-bottom: 1px solid #aaa;
		}

		@media screen and (min-width : 1024px) {
			.content {
				width: 90%;
			}
		}

		.treeview {
			position: relative;
			height: 100%;
			float: left;
			overflow: auto;
			border-top: 1px solid #aaa;
		}

		.treeview-bold {
			font-weight: bold;
		}

		.list-container {
			display: flex;
			flex-direction: column;
			position: relative;
			height: 100%;
			overflow: auto;
			border-top: 1px solid #aaa;
		}

        .list-files {
            flex-grow: 1;
            flex-basis: 0px; /* for IE11 */
            overflow: auto;
            position: relative;
        }

		.search_indicator {
			position: absolute;
			left: 0px;
			right: 0px;
			top: 0px;
			bottom: 0px;
			background-color: white;
			opacity: 0.7;
			text-align: center;
			padding-top: 7rem;
			font-size: 1.75rem;
			display: none;
			z-index: 99;
		}

		/* --- Splitter --- */

		.vsplitbar {
			width: 6px;
			background: #d7dee3;
			border-right: 1px solid #bbb;
		}

		/* --- File Table --- */

        #files.tablesorter {
            font-family: system-ui, arial;
            background-color: white;
            line-height: 1.25rem;
            width: 100%;
            text-align: left;
            border-spacing: 0px;
            image-rendering: pixelated;
        }

		#files.tablesorter thead tr th, #files.tablesorter tfoot tr th {
			background: #ffefcc;
			border-left: 1px solid #ccc;
			border-right: 1px solid #ccc;
			padding: 4px;
			border-left: 0px;
		}

	<script type="text/javascript">
		'use strict';

		/* --- Snap2HTML Code --- */

		var dirs = [];	// contains all directory data

		// Pointers to array indexes and magic numbers.

		var DIRINDEX_FOLDER = 0;
        var DIRINDEX_PARENTFOLDER = 1;
        var DIRINDEX_SUBFOLDERS = 2;
        var DIRINDEX_FILES = 3;

        var SUBINDEX_NAME = 0;
        var SUBINDEX_SIZE = 1;
        var SUBINDEX_DATE = 2;

		var FOLDER_SIZE_ERROR = "-1";	// Size if the folder could not be read

		var ROOTFOLDER_ID = 0;
		var ROOTFOLDER_PARENT_ID = -1;

		var SEARCH_DIRINDEX = 0;
		var SEARCH_FILENAMES_FILENAME_LOWECASE = 1;
		var SEARCH_FILENAMES_SIZE = 2;
		var SEARCH_FILENAMES_DATE = 3;
		var SEARCH_FILENAMES_FILENAME_ORIGINAL = 4;

		var NUMBER_BASE = 36;	// number are stored in BASE36 to save space



		// Start function

		$(document).ready(function () {
			if (snap.numDirs > 10000) {
				$("#loading").html("Initializing...");
			}
			setTimeout(function () {
				loadData();
				run();
			}, 1);
		});

		function run() {

			/* ---  Init --- */

			var originalHash = location.hash.replace(/#/, "");
			var selectedFolderId = "-1";
			var currentView;

			if(window.Intl) {
				window.dateFormatter = new Intl.DateTimeFormat(viewOptions.dateFormatLocale, viewOptions.dateFormatOptions);
			} else {
				window.dateFormatter = {
					format: function(date) {
						return date.toLocaleString()
					}
				}
			}

			String.prototype.endsWith = function (suffix) {
				return this.indexOf(suffix, this.length - suffix.length) !== -1;
			};


			/* --- Support multiple root dirs --- */

			snap.isMultiRoot = false;
			for(var id=0; id<dirs.length; id++) {
				if(dirs[id][DIRINDEX_PARENTFOLDER] === ROOTFOLDER_PARENT_ID && id !== 0) {
					snap.isMultiRoot = true;
					break;
				}
			}
			if(snap.isMultiRoot) {
				// when multi root: add a fake root dir to use as parent for the other roots
				dirs.unshift([snap.title + "*0*0",-1,"", {"title":snap.title,"numDirs": 0,"numFiles":0,"sourceDir":"","linkRoot":"","timestamp":0,"totBytes":0}])
			}


			// Create an array with offsets, telling us what root a dir belongs to (as an offset in the dirs array), and what snap.rootDirs entry to use
			snap.rootDirs = {};
			snap.rootDirOffsets = []; 
			var currentRootDirIndex = 0;
			for(var id=0; id<dirs.length; id++) {
				if(dirs[id][DIRINDEX_PARENTFOLDER] === ROOTFOLDER_PARENT_ID) {
					currentRootDirIndex = id;
					snap.rootDirs[id] = dirs[id].pop(); // remove the last entry in each root dir entry which is always the metadata object
				}
				snap.rootDirOffsets.push(currentRootDirIndex);
			}

			if(snap.isMultiRoot) {
				// set the "child folders" (each root dir) of the multi root object
				var rootDirIds = Object.keys(snap.rootDirs).slice(1);
				dirs[0][DIRINDEX_SUBFOLDERS] = rootDirIds.join("*");

				// join file counts
				snap.numFiles = 0
				snap.numDirs = 0
				for(var i in snap.rootDirs){ 
					snap.numFiles += snap.rootDirs[i].numFiles
					snap.numDirs += snap.rootDirs[i].numDirs
				}
			}

			snap.linkFiles = false;
			for(var i in snap.rootDirs) { 
				if(snap.rootDirs[i].linkRoot !== "") {
					snap.linkFiles = true;
					if(snap.rootDirs[i].linkRoot.endsWith("/") === false) snap.rootDirs[i].linkRoot += "/";
				}

				snap.rootDirs[i].searchLocationSubstringStart = 0;
				if(snap.rootDirs[i].sourceDir.length > 3) {
					snap.rootDirs[i].searchLocationSubstringStart = snap.rootDirs[i].sourceDir.substring(0, snap.rootDirs[i].sourceDir.lastIndexOf("\\") + 1).length;
				}
			}


			/* --- Misc setup --- */

			$("#loading").remove();
			$("#content").show();

			// set size of areas
			$("#content").height($("#wrapper").outerHeight(true) - $("#app-header").outerHeight(true) - 1);

			if (/Mobi/.test(navigator.userAgent) && window.innerWidth <= 640) {
				// if mobile or narrow width, always hide treeview
				$("#content").splitter({ sizeLeft: viewOptions.treeWidthMobile });
			} else {
				$("#content").splitter({ sizeLeft: viewOptions.treeWidth });
			}

			$.tablesorter.addParser({
				id: 'datasort',
				is: function (s, table, cell, $cell) {
					// return false so this parser is not auto detected
					return false;
				},
				format: function (s, table, cell, cellIndex) {
					var $cell = $(cell);
					// returns data-attribute, or cell text (s) if it doesn't exist
					return $cell.attr('data-sort') || s;
				},
				// flag for filter widget (true = ALWAYS search parsed values; false = search cell text)
				parsed: false,
				// set type, either numeric or text
				type: 'numeric'
			});


			/* --- Events --- */

			$("#search_form").submit(function () {
				return false;
			});

			var addFolderClickEventHandlers = function () {
				$("#list-files a.folder_link").click(function () {
					expandToFolder($(this).attr('id'));
					return false;
				});
			}

			// Handle clicks on folders in file list
			$("body").delegate("a.folder_link", "click", function () {
				expandToFolder($(this).attr('id'));
				return false;
			});

			// Handle window resize
			var resizeHandler = debounce(function () {
				// resize is mostly automatic, but we need set the height manually and to tell the splitter to redraw
				$("#content").height($("#wrapper").outerHeight(true) - $("#app-header").outerHeight(true) - 1);
				$("#content").trigger("resize");
				// for some reason it still did not redraw correctly unless I added a second resize trigger...
				$("#content").height($("#wrapper").outerHeight(true) - $("#app-header").outerHeight(true) - 1);
				$("#content").trigger("resize");
			}, 250);
			window.addEventListener('resize', resizeHandler);

			// Back & forward in history
			function popstateListener(ev) {
				var folderId = location.hash.split("|")[0];
				if(!folderId) folderId = "0";
				folderId = folderId.replace(/#/, "")
				if(currentDirId !== Number(folderId)) {
					showFolder(folderId);
				}
			}
			window.addEventListener('popstate', popstateListener);


			/* --- Search --- */

			var searchDelay = 250;
			var numberOfItems = snap.numFiles + snap.numDirs;
			if (numberOfItems > 1000) {
				searchDelay = 1000;
			}

			var searchKeyPressHandler = debounce(function (keyEvent) {
				// cancel debounced event if no keyEvent
				if (!keyEvent) return;

				// skip searching on keys: tab, shift, ctrl, alt, end, home, arrows
				var keysToSkip = [9, 16, 17, 18, 35, 36, 37, 38, 39, 40];
				if (keysToSkip.indexOf(keyEvent.keyCode) !== -1) {
					return;
				}

				// on mobile, skip auto search on keypress
				if (/Mobi/.test(navigator.userAgent)) {
					return;
				}

				doSearch(false);
			}, searchDelay);

			document.getElementById("search_text").addEventListener('input', searchKeyPressHandler);	// for handling pressing the x
			document.getElementById("search_text").addEventListener('keypress', searchKeyPressHandler);
			document.getElementById("search_text").addEventListener('keyup', function (event) {
				if (event.code == "Enter" || event.code == "NumpadEnter") {		// on enter key search immediately
					searchKeyPressHandler(null);		// cancel any current debounced event
					doSearch(true);
				}
			});


			var SearchData_Item = [];
			var SearchData_Location = [];
			var SearchData_LocationRaw = [];
			var SearchData_LocationID = [];
			var SearchData_IsDir = [];

			var previouslySelectedNode = null;
			var currentDirId = -1;

			var previousSearch = {};

			function buildSearchCache() {
				// Do some pre-processing for faster search

				var nFound = 0;
				for (var c = 1; c < dirs.length; c++) // dirs first...
				{
					var dir = getParsedDir(c);
					SearchData_Item[nFound] = [
						c,							// SEARCH_DIRINDEX
						dir.name.toLowerCase(),		// SEARCH_FILENAMES_FILENAME_LOWECASE
						dir.size,					// SEARCH_FILENAMES_SIZE
						dir.date,					// SEARCH_FILENAMES_DATE
						dir.name,					// SEARCH_FILENAMES_FILENAME_ORIGINAL
					]

                    SearchData_LocationRaw[nFound] = getFullPath(dir.parent);
					SearchData_Location[nFound] = SearchData_LocationRaw[nFound].substring(getRootDirDataForDir(dir.parent).searchLocationSubstringStart);

					SearchData_LocationID[nFound] = c;
					SearchData_IsDir[nFound] = true;
					nFound++;
				}
				for (var c = 0; c < dirs.length; c++) // ...then all files
				{
					var files = getParsedFiles(c);
					for (var i=0; i<files.length; i++) {

						SearchData_Item[nFound] = [
							c,								// SEARCH_DIRINDEX
							files[i].name.toLowerCase(),	// SEARCH_FILENAMES_FILENAME_LOWECASE
							files[i].size,					// SEARCH_FILENAMES_SIZE
							files[i].date,					// SEARCH_FILENAMES_DATE
							files[i].name,					// SEARCH_FILENAMES_FILENAME_ORIGINAL
						]

						SearchData_LocationRaw[nFound] = getFullPath(c);
						SearchData_Location[nFound] = SearchData_LocationRaw[nFound].substring(getRootDirDataForDir(c).searchLocationSubstringStart);

						SearchData_LocationID[nFound] = c;
						SearchData_IsDir[nFound] = false;
						nFound++;
					}
				}
			}; // end buildSearchCache()

			function doSearch(enterPressed) {

				var currentSearch = {
					query: $("#search_text").val().toLowerCase().trim(),
					onlyCurrentDir: false,
					onlyCurrentDirIncludingSubdirs: false,
					includeFiles: true,
					includeDirs: true
				};

				if (currentSearch.query === "") {
					if (previouslySelectedNode != null) {
						previouslySelectedNode.activate();
						previouslySelectedNode = null;
					}
					return;
				}

				// prevent automatic search for short queries
				if (currentSearch.query.length <= 2 && !enterPressed) return;

				// find search prefixes
				var foundPrefix;
				do {
					// limit search to only files or folders
					foundPrefix = false;
					if (currentSearch.query.indexOf("f:") === 0) {
						currentSearch.includeDirs = false;
						currentSearch.query = currentSearch.query.substr(2);
						foundPrefix = true;
					}
					if (currentSearch.query.indexOf("d:") === 0) {
						currentSearch.includeFiles = false;
						currentSearch.query = currentSearch.query.substr(2);
						foundPrefix = true;
					}

					// search only current folder and optionally subfolders using > and >>
					if (currentSearch.query.indexOf(">") === 0) {
						currentSearch.onlyCurrentDir = true;
						currentSearch.query = currentSearch.query.substr(1);
						if (currentSearch.query.indexOf(">") === 0) {
							currentSearch.onlyCurrentDirIncludingSubdirs = true;
							currentSearch.query = currentSearch.query.substr(1);
						}
						foundPrefix = true;
					}

				} while(foundPrefix)


				// prevent searching twice
				if (currentSearch.query === previousSearch.query &&
					currentSearch.onlyCurrentDir === previousSearch.onlyCurrentDir &&
					currentSearch.onlyCurrentDirIncludingSubdirs === previousSearch.onlyCurrentDirIncludingSubdirs &&
					currentSearch.includeFiles === previousSearch.includeFiles &&
					currentSearch.includeDirs === previousSearch.includeDirs)
				{
					return;
				}

				previousSearch = {
					query: currentSearch.query,
					onlyCurrentDir: currentSearch.onlyCurrentDir,
					onlyCurrentDirIncludingSubdirs: currentSearch.onlyCurrentDirIncludingSubdirs,
					includeFiles: currentSearch.includeFiles,
					includeDirs: currentSearch.includeDirs
				}

				if ( (SearchData_Item.length === 0 && numberOfItems > 100000) || (SearchData_Item.length > 0 && numberOfItems > 500000) ) {
					$("#search_indicator").text("Searching...").show();
				}

				setTimeout(function () { // timeout allows redrawing screen before possible time consuming search

					if (selectedFolderId != -1) {
						previouslySelectedNode = $("#treeview").dynatree("getActiveNode");
						selectedFolderId = "-1";
						if(previouslySelectedNode !== null) {
							previouslySelectedNode.deactivate();
						}
					}

					if (SearchData_Item.length === 0) {
						buildSearchCache();
					}

					var locationHtml = "";

					if (viewOptions.showSearchLocationColumn) {
						locationHtml = "<th>Folder</th>";
					}

					currentView = [];
					var tableHtml = "";
					tableHtml += "<table id='files' class='tablesorter'>";
					tableHtml += "<thead>" +
										"<tr>" +
											"<th>Name</th>" + 
											locationHtml + 
											"<th>Size</th>" + 
											"<th>Modified</th>" + 
										"</tr>" + 
									"</thead>";
									
					tableHtml += "<tbody>";

					var countFiles = 0;
					var countDirs = 0;
					var sizeFiles = 0;

					var SearchTextEscaped = currentSearch.query.replace(/[\-\[\]\/\{\}\(\)\+\.\\\^\$\|]/g, "\\$&");
					SearchTextEscaped = SearchTextEscaped.replace(/\*/g, ".*");
					SearchTextEscaped = SearchTextEscaped.replace(/\?/g, ".");
					var queryRegEx = new RegExp(SearchTextEscaped);
					var highlightRegEx = new RegExp(SearchTextEscaped, "gi");
					var hightlightResult = viewOptions.highlightSearchResult === true && currentSearch.query !== "*" && currentSearch.query !== "*.*" && currentSearch.query.indexOf("*.") !== 0

					function foundItem(cacheIndex) {

						if (currentSearch.onlyCurrentDir) {
							var idPath = getIdPathToDir(SearchData_LocationID[cacheIndex]);

							if (idPath.indexOf(currentDirId) === -1) {
								// skip items not in current idPath
								return;
							}

							if (idPath[idPath.length - 1] === currentDirId) {
								// file in current dir --> ok for both searchThisDirOnly and searchThisDirOnlyIncludeSubdirs
								if (SearchData_IsDir[cacheIndex] && SearchData_LocationID[cacheIndex] == currentDirId) {
									// always skip current dir which appears here
									return;
								}
							} else if (SearchData_IsDir[cacheIndex] && idPath[idPath.length - 2] === currentDirId) {
								// dir in current dir are also ok
							} else if (idPath.indexOf(currentDirId) !== -1) {
								// item is in a subdir: ok for searchThisDirOnlyIncludeSubdirs
								if (!currentSearch.onlyCurrentDirIncludingSubdirs) {
									return;
								}
							}
						}

						if (SearchData_Location[cacheIndex] === "") return;	// don't show multi root items

						if (SearchData_IsDir[cacheIndex] === true) {
							if (currentSearch.includeDirs === true) {
								countDirs++;

								locationHtml = "";
								if (viewOptions.showSearchLocationColumn) {
									locationHtml =
												"<td class='folder-icon'>" + 
													"<span class='file-folder'><a href='#' class='folder_link' id='" + getParsedDir(SearchData_LocationID[cacheIndex]).parent + "'> " + SearchData_Location[cacheIndex] + "</a></span>" + 
												"</td>";
								}

								var dirHtml = SearchData_Item[cacheIndex][SEARCH_FILENAMES_FILENAME_ORIGINAL];

								if(hightlightResult) {
									dirHtml = dirHtml.replace(highlightRegEx, function(match) {
										return '<mark class="highlight">' + match + '</mark>'
									});
								}

								tableHtml +=
									"<tr>" +
										"<td class='folder-icon'><span class='file-folder'><a href='#' class='folder_link' id='" + SearchData_LocationID[cacheIndex] + "'> " + dirHtml + "</a></span></td>" +
										locationHtml +
										"<td class='size' data-sort='" + SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE] + "'>" + bytesToSize(SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE]) + "</td>" +
										"<td class='date' data-sort='" + SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE] + "'>" + timestampToDate(SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE]) + "</td>" +
									"</tr>";

								currentView.push({ 
									"name": SearchData_Item[cacheIndex][SEARCH_FILENAMES_FILENAME_ORIGINAL], 
									"path": SearchData_LocationRaw[cacheIndex],
									"type": "dir", 
									"size": SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE], 
									"date": SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE] 
								});
							}
						} else {	// files
							if (currentSearch.includeFiles === true) {
								sizeFiles += SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE];
								countFiles++;

								var foundFilename = SearchData_Item[cacheIndex][SEARCH_FILENAMES_FILENAME_ORIGINAL];
								
								var fileHtml = foundFilename;

								if(hightlightResult) {
									fileHtml = foundFilename.replace(highlightRegEx, function(match) {
										return '<mark class="highlight">' + match + '</mark>'
									});
								}

								if (snap.linkFiles) {
									fileHtml = createLinkedFile(foundFilename, fileHtml, SearchData_LocationID[cacheIndex]);
								}

								locationHtml = "";
								if (viewOptions.showSearchLocationColumn) {
									locationHtml =
												"<td class='folder-icon'>" + 
													"<span class='file-folder'><a href='#' class='folder_link' id='" + SearchData_LocationID[cacheIndex] + "'>" + SearchData_Location[cacheIndex] + "</a></span>" + 
												"</td>";
								}

								tableHtml +=
										"<tr>" +
											"<td class='file-icon'><span class='file'>" + fileHtml + "</span></td>" +
											locationHtml +
											"<td class='size' data-sort='" + SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE] + "'>" + bytesToSize(SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE]) + "</td>" +
											"<td class='date' data-sort='" + SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE] + "'>" + timestampToDate(SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE]) + "</td>" +
										"</tr>";

								currentView.push({ 
									"name": SearchData_Item[cacheIndex][SEARCH_FILENAMES_FILENAME_ORIGINAL], 
									"path": SearchData_LocationRaw[cacheIndex], 
									"type": "file", 
									"size": SearchData_Item[cacheIndex][SEARCH_FILENAMES_SIZE], 
									"date": SearchData_Item[cacheIndex][SEARCH_FILENAMES_DATE] 
								});
							}
						}
					} // end foundItem()

					// search for matches
					if (currentSearch.query.indexOf("*") !== -1 || currentSearch.query.indexOf("?") !== -1) {
						for (c = 0; c < SearchData_Item.length; c++) {
							if (queryRegEx.test(SearchData_Item[c][SEARCH_FILENAMES_FILENAME_LOWECASE])) {
								foundItem(c);
							}
						}
					} else {
						// use indexOf instead of regex if no wildcards since it's faster
						for (c = 0; c < SearchData_Item.length; c++) {
							if (SearchData_Item[c][SEARCH_FILENAMES_FILENAME_LOWECASE].indexOf(currentSearch.query) !== -1) {
								foundItem(c);
							}
						}
					}

					if ((countFiles + countDirs) > viewOptions.largeSearchResultWarning && viewOptions.largeSearchResultWarning > 0) {
						var okToContinue = confirm("Search found " + (countFiles + countDirs) + " files.\n\nShowing large number of files takes a lot of time and the browser might become unresponsive or even crash.\n\nDo you want to continue?")
						if (!okToContinue) {
							$("#search_indicator").hide();
							return;
						}
						$("#search_indicator").text("Searching...").show();
					}

					tableHtml += "</tbody>";
					tableHtml += "</table>";

					$("#breadcrumb").html("Search Results <span class='path-divider'>/</span>");
					$("#list-files").scrollTop(0).html(tableHtml);
					$("#search_indicator").hide();
					addFolderClickEventHandlers();

					var tablesorterHeaders = { 1: { sorter: 'datasort' }, 2: { sorter: 'datasort' } }
					if (viewOptions.showSearchLocationColumn) {
						tablesorterHeaders = { 2: { sorter: 'datasort' }, 3: { sorter: 'datasort' } }
					}

					$("#files").tablesorter({
						sortInitialOrder: "desc",
						headers: tablesorterHeaders
					});

					if(countFiles === 0 && countDirs === 0) {
						$("#search_indicator").text("No results found for '" + currentSearch.query + "'...").show();
					}

					var sFiles = " files"; if (countFiles === 1) sFiles = " file";
					var sDirs = " folders"; if (countDirs === 1) sDirs = " folder";
					$("#list-footer-info-label").html(countDirs + sDirs + ", " + countFiles + sFiles + " (" + bytesToSize(sizeFiles) + ")");

				}, 50); // end setTimeout before search
			}; // end doSearch()


			/* --- Show content of a folder --- */

			function showFolder(folderId) {

				if (selectedFolderId === folderId) return false;
				selectedFolderId = folderId;

				$("#search_text").val("");
				previousSearch = {};
				$("#search_indicator").hide();

				var idPath = getIdPathToDir(folderId);
				var breadcrumbs = "";
				if(snap.isMultiRoot && folderId === "0") {
					breadcrumbs = "&nbsp;";
				} else {
					for (var c = 0; c < idPath.length; c++) {
						var dirName = getParsedDir(idPath[c]).name;
						if (c === 0) {
							dirName = dirName.replace(/\:\//g, "");	// remove :\ from volume labels in breadcrumb
						}
						if (c == idPath.length - 1) {
							breadcrumbs += dirName;
						} else {
							breadcrumbs += "<a href='#' class='folder_link' id='" + idPath[c] + "'>" + dirName + "</a>" + "<span class='path-divider'>/</span>";
						}
					}
				}

				currentDirId = Number(folderId);
				var currentDir = getParsedDir(currentDirId);
				var currentViewPath = getFullPath(folderId);

				// Update the URL hash
				var hash = getRootDirRelativePath(folderId);
				hash = hash.replace(/%/g, "%25").replace(/#/g, "%23");
				if (currentDirId !== 0) {
					location.hash = "#" + currentDirId + "|" + hash;
				}
				else {
					location.hash = "#0";
				}

				var tableHtml = "";
				var showParentFolderClass = "";
				if (isRootDir(folderId) === false || (snap.isMultiRoot === true && folderId !== "0")) {
					showParentFolderClass = " has-parent-folder"
					tableHtml +=
								"<div id='parent-folder' class='folder-icon'>" + 
									"<span class='file-folder'><a href='#' class='folder_link' id='" + currentDir.parent + "'>[..]</a></span>" + 
								"</div>";
				}
				tableHtml += "<table id='files' class='tablesorter" + showParentFolderClass + "'>";
				tableHtml +=
						"<thead>" + 
							"<tr>" + 
								"<th>Name</th>" + 
								"<th>Size</th>" + 
								"<th>Modified</th>" + 
							"</tr>" + 
						"</thead>";
				
				tableHtml += "<tbody>";

				currentView = [];
				var countFiles = 0;
				var countDirs = 0;
				var sizeFiles = 0;
				var subdirTotSizes = 0;

				if(currentDir.error === true) {
					tableHtml +=
						"<tr>" +
							"<td>❌ The contents of this folder could not be read</td>" +
							"<td></td>" +
							"<td></td>" +
						"</tr>";
				}

				// folders
				var subdirs = getParsedSubdirs(currentDirId);
				for (var c=0; c<subdirs.length; c++) {
					countDirs++;
					subdirTotSizes += subdirs[c].size;
					tableHtml +=
						"<tr>" +
							"<td class='folder-icon'><span class='file-folder'><a href='#' class='folder_link' id='" + subdirs[c].id + "'> " + subdirs[c].name + "</a></span></td>" +
							"<td class='size' data-sort='" + subdirs[c].size + "'>" + bytesToSize(subdirs[c].size) + "</td>" +
							"<td class='date' data-sort='" + subdirs[c].date + "'>" + timestampToDate(subdirs[c].date) + "</td>" +
						"</tr>";
					currentView.push({
						"name": subdirs[c].name,
						"path": currentViewPath,
						"type": "dir",
						"size": subdirs[c].size,
						"date": subdirs[c].date
					});
				}

				// files
				var files = getParsedFiles(currentDirId);
				for (var c=0; c<files.length; c++) {
					countFiles++;

					var fileHtml = files[c].name;
					sizeFiles += files[c].size;

					if (snap.linkFiles) {
						fileHtml = createLinkedFile(files[c].name, fileHtml, selectedFolderId);
					}

					tableHtml +=
						"<tr>" +
							"<td class='file-icon'><span class='file'>" + fileHtml + "</span></td>" +
							"<td class='size' data-sort='" + files[c].size + "'>" + bytesToSize(files[c].size) + "</td>" +
							"<td class='date' data-sort='" + files[c].date + "'>" + timestampToDate(files[c].date) + "</td>" +
						"</tr>";
					currentView.push({ 
						"name": files[c].name,
						"path": currentViewPath,
						"type": "file",
						"size": files[c].size,
						"date": files[c].date
					});
				}

				tableHtml += "</tbody>";
				tableHtml += "</table>";


				$("#breadcrumb").html(breadcrumbs);
				$("#list-files").scrollTop(0).html(tableHtml);
				addFolderClickEventHandlers();
				$("#files").tablesorter({
					sortInitialOrder: "desc",
					headers: {
						1: { sorter: 'datasort' },
						2: { sorter: 'datasort' }
					}
				});


				var sFiles = " files"; if (countFiles === 1) sFiles = " file";
				var sDirs = " folders"; if (countDirs === 1) sDirs = " folder";
				$("#list-footer-info-label").html(countDirs + sDirs + " (" + bytesToSize(subdirTotSizes) + "), " + countFiles + sFiles + " (" + bytesToSize(sizeFiles) + ")");

				expandToFolder(selectedFolderId);
				return false;
			}

			function createLinkedFile(filename, filenameHtml, pathFolderId) {
				var ext = filename.split('.').pop();
				var linkRoot = decodeURI(getRootDirDataForDir(pathFolderId).linkRoot);
				if (linkRoot !== "" && (viewOptions.onlyLinkTheseExtensions.length === 0 || viewOptions.onlyLinkTheseExtensions.indexOf(ext) !== -1)) {
					var relativeRoot = getRootDirRelativePath(pathFolderId).replace(/\\/g, "/") + "/";
					var fileLink = encodeURI(linkRoot + relativeRoot + filename).replace(/#/g, "%23");
					var target = viewOptions.openLinksInNewTab ? " target='_blank'" : "";
					return "<a href='" + fileLink + "' " + target + ">" + filenameHtml + "</a>";
				} else {
					return filenameHtml;
				}
			}


			/* --- Treeview --- */

			function addSubdirsToTreeviewNode(node) {
				var subdirs = getParsedSubdirs(Number(node.data.key));
				for (var i=0; i<subdirs.length; i++) {
					node.addChild({
						title: subdirs[i].name,
						key: subdirs[i].id,
						unselectable: true,
						isFolder: true,
						expand: node.getLevel() < viewOptions.treeExpandOnLoad ? true : false,
						tooltip: bytesToSize(subdirs[i].size)
					});
				}
				if(node.getLevel() <= viewOptions.treeExpandOnLoad) {
					ensureTreeviewNodeChildren(node);
				}
			}

			function ensureTreeviewNodeChildren(node) {
				// Ensures that expanded nodes (and their children) are added to the treeview
				$("#treeview").dynatree("getTree").enableUpdate(false);
				if(node.childList) {
					for(var i=0; i<node.childList.length; i++) {
						var childNode = node.childList[i];
						if(!childNode.childList) {	// only process once
							addSubdirsToTreeviewNode(childNode);
						}
					}
				}
				$("#treeview").dynatree("getTree").enableUpdate(true);
			}

			$("#treeview").dynatree({
				clickFolderMode: 1,
				minExpandLevel: 2,
				fx: { height: "toggle", duration: 100 },
				onActivate: function (node) {
					showFolder(node.data.key);
				},
				onDblClick: function (node) {
					node.expand(!node.isExpanded());
				},
				onExpand: function(flag, expandedNode) {
					ensureTreeviewNodeChildren(expandedNode)
				}
				//children: [
				//{title: "Root", isFolder: true}
				//]
			});

			// Add treeview root nodes and initialize them
			var rootDir = getParsedDir(0);
			var addedNode = $("#treeview").dynatree("getRoot").addChild({
				title: rootDir.name,
				key: "0",
				isFolder: true,
				tooltip: snap.isMultiRoot ? "" : bytesToSize(rootDir.size),
				expand: snap.isMultiRoot ? true : false,
			});
			addSubdirsToTreeviewNode(addedNode);
			ensureTreeviewNodeChildren(addedNode)
			$("#treeview").dynatree("getRoot").childList[0].activate();


			// Browse directly to folder at startup
			// Hash format: #id|path (example: #4|\dir%201\dir%202)
			if (originalHash !== "") {
				var folderId = undefined;
				if (originalHash.indexOf("|") !== -1) {
					folderId = originalHash.split("|")[0];
					// verify that id has not changed (if html was re-generated)
					var hashPath = decodeURIComponent(originalHash.split("|")[1]);
					if(getRootDirRelativePath(folderId) !== hashPath) {
						// if path in the hash does not match the path of the id, iterate all dirs to try to find the path
						folderId = 0;
						for (var c = 0; c < dirs.length; c++) {
							if (hashPath === getRootDirRelativePath(c)) {
								folderId = c;
								break;
							}
						}
					}
				} else {
					// try to handle incoming links from v2.14 and older that had a different hash format (no id in the hash & full path was used)
					originalHash = decodeURI(originalHash).replace(/\//g, "\\");
					for (var c = 0; c < dirs.length; c++) {
						if (originalHash === getFullPath(c)) {
							folderId = c;
							break;
						}
					}
				}

				if (folderId) {
					expandToFolder(folderId);
				} else {
					location.hash = "";
				}
			}

			function expandToFolder(id) {
				var tree = $("#treeview").dynatree("getTree");

				var idPath = getIdPathToDir(id);
				for(var i=0; i<idPath.length; i++) {
					var node = tree.getNodeByKey(idPath[i].toString())
					ensureTreeviewNodeChildren(node)
				}

				var node = tree.getNodeByKey(id.toString());
				if (node) {
					node.activate();
					if(viewOptions.scrollToActiveTreeviewNode) {
						setTimeout(function() {
							node.span.scrollIntoView(true);
							/* To prevent horizontal scrolling, this could be used instead:
							var container = $(".dynatree-container")[0];
							var scrollLeft = container.scrollLeft;
							node.span.scrollIntoView({ behavior: "instant" });
							container.scrollLeft = scrollLeft;
							*/
						}, 100)
					}
				}
			}

			/* --- Export LightBox --- */

			function populateExport() {
				var output_plain = "";
				var output_json = [];
				var output_csv = "";

				// get the settings
				var showFiles = $("#export_checkbox_files").prop("checked")
				var showDirs = $("#export_checkbox_dirs").prop("checked")
				var fullPath = $("#export_checkbox_path").prop("checked")

				var colPath = $("#export_checkbox_col_path").prop("checked")
				var colType = $("#export_checkbox_col_type").prop("checked")
				var colSize = $("#export_checkbox_col_size").prop("checked")
				var colDate = $("#export_checkbox_col_date").prop("checked")

				var type = $("#export-lightbox input[type='radio']:checked").val();

				// set csv header
				var csv_line = "\"Name\"";
				if (colPath) csv_line += ",\"Path\"";
				if (colType) csv_line += ",\"Type\"";
				if (colSize) csv_line += ",\"Size\"";
				if (colDate) csv_line += ",\"Date\"";
				output_csv = csv_line + "\n";

				// collect and format items
				for (var i = 0; i < currentView.length; i++) {

					var path = "";
					if (fullPath) {
						path = currentView[i].path;
						if (!path.endsWith("\\")) path += "\\";
					}

					var json_line = { "name": (path + currentView[i].name) }
					if (colPath) json_line.path = currentView[i].path;
					if (colType) json_line.type = currentView[i].type;
					if (colSize) json_line.size = currentView[i].size;
					if (colDate) json_line.date = new Date(currentView[i].date * 1000).toISOString();

					var csv_line = "\"" + path + currentView[i].name + "\"";
					if (colPath) csv_line += ",\"" + currentView[i].path + "\"";
					if (colType) csv_line += ",\"" + currentView[i].type + "\"";
					if (colSize) csv_line += ",\"" + currentView[i].size + "\"";
					if (colDate) csv_line += ",\"" + new Date(currentView[i].date * 1000).toISOString() + "\"";

					if (showFiles && currentView[i].type == "file") {
						output_plain += path + currentView[i].name + "\n";
						output_json.push(json_line);
						output_csv += csv_line + "\n";
					}
					if (showDirs && currentView[i].type == "dir") {
						output_plain += path + currentView[i].name + "\n";
						output_json.push(json_line);
						output_csv += csv_line + "\n";
					}
				}

				// print items
				var output = "";
				if (type == "plain") {
					output = output_plain;
				} else if (type == "json") {
					output = JSON.stringify(output_json).replace(/},/g, "},\n").replace(/^\[/, "[\n").replace(/\]$/, "\n]");
				} else if (type == "csv") {
					output = output_csv;
				}
				$("#export-text").text(output).focus().select();
			}

			/* --- Helper Functions --- */

			function isRootDir(id) {
				return Object.keys(snap.rootDirs).indexOf(id.toString()) !== -1;
			}

			function getRootDirDataForDir(dirId) {
				var index = snap.rootDirOffsets[dirId];
				if(snap.rootDirs[index] === undefined) {
					// should not happen, but just in case
					return { title: "", timestamp: 0, sourceDir: "", numFiles: 0, numDirs: 0, bytes: 0, linkRoot: "", searchLocationSubstringStart: 0 };
				}
				return snap.rootDirs[index];
			}

			function getParsedDir(dirId) {
				var dir = dirs[dirId][DIRINDEX_FOLDER].split("*");
				var error = dir[SUBINDEX_SIZE] === FOLDER_SIZE_ERROR;
				var parentId = Number(dirs[dirId][DIRINDEX_PARENTFOLDER]);
				return {
					id: dirId,
					//name: dir[SUBINDEX_NAME] + " " + dirId,		// Can be useful for for debugging multi root dirs (linking wont work)
					name: dir[SUBINDEX_NAME],
					size: error ? 0 : parseInt(dir[SUBINDEX_SIZE], NUMBER_BASE),
					date: parseInt(dir[SUBINDEX_DATE], NUMBER_BASE),
					error: error,
					parent: parentId === -1 ? 0 : parentId + snap.rootDirOffsets[dirId],
				}

			}

			function getParsedSubdirs(rootDirId) {
				var result = [];
				var subDirsData = dirs[rootDirId][DIRINDEX_SUBFOLDERS];
				if(subDirsData !== "") {
					var subDirIds = subDirsData.split("*");
					for (var i=0; i<subDirIds.length; i++) {
						result.push(getParsedDir(Number(subDirIds[i]) + snap.rootDirOffsets[rootDirId]));
					}
				}
				return result;
			}

			function getParsedFiles(dirId) {
				var result = [];
				for (var i=DIRINDEX_FILES; i<dirs[dirId].length; i++) {
					var file = dirs[dirId][i].split("*");
					result.push({
						name: file[SUBINDEX_NAME],
						size: parseInt(file[SUBINDEX_SIZE], NUMBER_BASE),
						date: parseInt(file[SUBINDEX_DATE], NUMBER_BASE),
					});
				}
				return result;
			}

			function getFullPath(id) {
				// returns the path + folder name, e.g. 'C:\Temp\Dir1\Dir2'
				// does not end in backslash except if root path (c:\)
				var idPath = getIdPathToDir(id);
				var sourceDir = getRootDirDataForDir(id).sourceDir;
				if(sourceDir.endsWith("\\")) sourceDir = sourceDir.slice(0, -1); 
				var realPath = [sourceDir];
				for (var i = 0; i < idPath.length; i++) {
					if (i !== ROOTFOLDER_ID) {
						realPath.push(getParsedDir(idPath[i]).name);
					}
				}
				return realPath.join("\\");
			}

			function getRootDirRelativePath(id) {
				// return the path starting from the root dir
				// starts with a backslash
				var sourceDir = getRootDirDataForDir(id).sourceDir;
				return getFullPath(id).substring(sourceDir.length);
			}

			function getIdPathToDir(id) {
				// returns an array, from root folder to id, e.g. if id=13 it could look like [0, 2, 13]
				var path = [id];
				var parentId = id;	// incoming id should already have correct "rootDirOffset"
				while(true) {
					parentId = Number(dirs[parentId][DIRINDEX_PARENTFOLDER]);
					if(parentId === ROOTFOLDER_PARENT_ID) {
						break;
					}
					parentId += snap.rootDirOffsets[id];
					path.push(parentId);
				}
				path.reverse();
				return path;
			}

			function bytesToSize(bytes) {
				var kilobyte = 1024;
				var megabyte = kilobyte * 1024;
				var gigabyte = megabyte * 1024;
				var terabyte = gigabyte * 1024;

				if ((bytes >= 0) && (bytes < kilobyte)) {
					return bytes + ' bytes';

				} else if ((bytes >= kilobyte) && (bytes < megabyte)) {
					return (bytes / kilobyte).toFixed(0) + ' KB';

				} else if ((bytes >= megabyte) && (bytes < gigabyte)) {
					return (bytes / megabyte).toFixed(1) + ' MB';

				} else if ((bytes >= gigabyte) && (bytes < terabyte)) {
