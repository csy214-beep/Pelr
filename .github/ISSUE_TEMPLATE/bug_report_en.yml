name: Bug Report
description: Submit a bug report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this issue!
  - type: checkboxes
    id: checks
    attributes:
      label: Prerequisite Check
      options:
        - label: I have searched existing Issues and Discussions to ensure there is no duplicate.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Bug Description
      description: Please provide a clear and concise description of the bug.
      placeholder: When I click on..., something goes wrong...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reliably reproduce the issue.
      placeholder: |
        1. Open '...'
        2. Click on '....'
        3. Scroll to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did you encounter this issue?
      options:
        - Local development environment
        - Test server
        - Production environment
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the project are you using?
      placeholder: e.g., v1.0.0
    validations:
      required: true