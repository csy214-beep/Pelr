name: Bug 报告
description: 提交一个 Bug 报告来帮助我们改进
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告这个问题！
  - type: checkboxes
    id: checks
    attributes:
      label: 先决条件检查
      options:
        - label: 我已搜索过现有的 Issues 和 Discussions，确保没有重复。
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个Bug。
      placeholder: 当我点击...时，发生了什么问题...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供能稳定复现该问题的详细步骤。
      placeholder: |
        1. 打开 '...'
        2. 点击 '....'
        3. 滚动到 '....'
        4. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 清晰简洁地描述你期望发生的结果。
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加截图来帮助解释你的问题。
  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      description: 你在什么环境下遇到了这个问题？
      options:
        - 本地开发环境
        - 测试服务器
        - 生产环境
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你正在使用的项目版本是什么？
      placeholder: e.g., v1.0.0
    validations:
      required: true
